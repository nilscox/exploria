name: Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  build-server:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/server:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/server:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/server:cache,mode=max

  build-client:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Build client image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: client/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/client:latest
          build-args: |
            VITE_DEFAULT_MODEL=${{ vars.VITE_DEFAULT_MODEL }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/client:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/client:cache,mode=max

  deploy:
    name: Deploy
    needs: [build-server, build-client]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy server
        run: |
          curl --fail -X POST "${{ secrets.COOLIFY_SERVER_WEBHOOK }}" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"

      - name: Deploy client
        run: |
          curl --fail -X POST "${{ secrets.COOLIFY_CLIENT_WEBHOOK }}" -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
